name: Build Olares Docker Image

on:
  pull_request:
    paths:
      - "Dockerfile.olares"
      - "docker/olares-entrypoint.sh"
      - "pyproject.toml"
      - "package.json"
      - "package-lock.json"
      - "web/**"
      - "ui-tui/**"
      - "hermes_cli/**"
      - "gateway/**"
      - "tools/**"
      - "cli-config.yaml.example"
      - ".env.example"
      - ".github/workflows/docker-olares.yml"
  push:
    branches:
      - main
    paths:
      - "Dockerfile.olares"
      - "docker/olares-entrypoint.sh"
      - "pyproject.toml"
      - "package.json"
      - "package-lock.json"
      - "web/**"
      - "ui-tui/**"
      - "hermes_cli/**"
      - "gateway/**"
      - "tools/**"
      - "cli-config.yaml.example"
      - ".env.example"
      - "olares/hermesagent/**"
      - ".github/workflows/docker-olares.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rpi-system-hermes-agent-olares

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract chart version
        id: chart
        run: |
          VERSION=$(grep '^version:' olares/hermesagent/Chart.yaml | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.chart.outputs.version }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.olares
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
