name: Bump Version

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump type"
        required: true
        default: minor
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump-version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version values
        id: bump
        env:
          BUMP: ${{ github.event.inputs.bump || 'minor' }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          bump = os.environ["BUMP"]

          chart_path = Path("olares/hermesagent/Chart.yaml")
          manifest_path = Path("olares/hermesagent/OlaresManifest.yaml")
          values_path = Path("olares/hermesagent/values.yaml")
          readme_path = Path("olares/hermesagent/README.md")

          chart = chart_path.read_text()
          manifest = manifest_path.read_text()
          values = values_path.read_text()
          readme = readme_path.read_text()

          chart_version_match = re.search(r"^version:\s*\"?([0-9]+\.[0-9]+\.[0-9]+)\"?\s*$", chart, re.M)
          app_version_match = re.search(r"^appVersion:\s*\"?([0-9]+\.[0-9]+\.[0-9]+)\"?\s*$", chart, re.M)
          manifest_version_match = re.search(r"^(\s*)version:\s*\"?([0-9]+\.[0-9]+\.[0-9]+)\"?\s*$", manifest, re.M)
          image_tag_match = re.search(r'^\s*tag:\s*"([0-9]+\.[0-9]+\.[0-9]+)"\s*$', values, re.M)
          readme_image_match = re.search(r"ghcr\.io/progress44/hermes-agent-olares:([0-9]+\.[0-9]+\.[0-9]+)", readme)

          if not chart_version_match:
              raise SystemExit("Could not find Chart.yaml version")
          if not app_version_match:
              raise SystemExit("Could not find Chart.yaml appVersion")
          if not manifest_version_match:
              raise SystemExit("Could not find OlaresManifest metadata version")
          if not image_tag_match:
              raise SystemExit("Could not find values.yaml image tag")
          if not readme_image_match:
              raise SystemExit("Could not find README image tag")

          old_chart_version = chart_version_match.group(1)
          old_app_version = app_version_match.group(1)
          old_manifest_version = manifest_version_match.group(2)
          old_image_tag = image_tag_match.group(1)
          old_readme_tag = readme_image_match.group(1)

          if not (
              old_chart_version
              == old_app_version
              == old_manifest_version
              == old_image_tag
              == old_readme_tag
          ):
              raise SystemExit(
                  "Version mismatch: "
                  f"chart={old_chart_version}, chart appVersion={old_app_version}, "
                  f"manifest={old_manifest_version}, image_tag={old_image_tag}, "
                  f"readme={old_readme_tag}"
              )

          major, minor, patch = map(int, old_chart_version.split("."))
          if bump == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump == "minor":
              minor += 1
              patch = 0
          elif bump == "patch":
              patch += 1
          else:
              raise SystemExit(f"Unsupported bump type: {bump}")

          new_version = f"{major}.{minor}.{patch}"

          chart = re.sub(
              r"^version:\s*\"?[0-9]+\.[0-9]+\.[0-9]+\"?\s*$",
              f"version: {new_version}",
              chart,
              count=1,
              flags=re.M,
          )
          chart = re.sub(
              r"^appVersion:\s*\"?[0-9]+\.[0-9]+\.[0-9]+\"?\s*$",
              f'appVersion: "{new_version}"',
              chart,
              count=1,
              flags=re.M,
          )
          manifest = re.sub(
              r"^(\s*)version:\s*\"?[0-9]+\.[0-9]+\.[0-9]+\"?\s*$",
              rf'\1version: "{new_version}"',
              manifest,
              count=1,
              flags=re.M,
          )
          values = re.sub(
              r'^\s*tag:\s*"[0-9]+\.[0-9]+\.[0-9]+"\s*$',
              f'  tag: "{new_version}"',
              values,
              count=1,
              flags=re.M,
          )
          readme = readme.replace(
              f"ghcr.io/progress44/hermes-agent-olares:{old_readme_tag}",
              f"ghcr.io/progress44/hermes-agent-olares:{new_version}",
              1,
          )

          chart_path.write_text(chart)
          manifest_path.write_text(manifest)
          values_path.write_text(values)
          readme_path.write_text(readme)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"old_version={old_chart_version}\n")
              f.write(f"new_version={new_version}\n")
          PY

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add olares/hermesagent/Chart.yaml olares/hermesagent/OlaresManifest.yaml olares/hermesagent/values.yaml olares/hermesagent/README.md
          git commit -m "bump version to ${{ steps.bump.outputs.new_version }}"
          git push
